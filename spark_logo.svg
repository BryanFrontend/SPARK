<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="#0D0D0D"/>
  <!-- Lightning bolt -->
  <polygon points="290,60 180,280 260,280 220,450 340,220 255,220 310,60"
           fill="url(#sparkGrad)" stroke="#FFD700" stroke-width="4"/>
  <!-- Glow effect -->
  <polygon points="290,60 180,280 260,280 220,450 340,220 255,220 310,60"
           fill="none" stroke="#FFD700" stroke-width="8" opacity="0.3"/>
</svg>
